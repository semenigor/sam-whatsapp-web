<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <title>Попередній перегляд</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #1f2937;
      color: #f9fafb;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    .toolbar {
      height: 48px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      background: #111827;
      border-bottom: 1px solid #374151;
      box-sizing: border-box;
    }

    .title {
      flex: 1;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-size: 14px;
      color: #e5e7eb;
    }

    button {
      border: 1px solid #4b5563;
      background: #374151;
      color: #f9fafb;
      border-radius: 6px;
      padding: 7px 12px;
      font-size: 13px;
      cursor: pointer;
    }

    button:hover {
      background: #4b5563;
    }

    .viewer {
      width: 100%;
      height: calc(100% - 48px);
      background: #111827;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #111827;
    }

    .error {
      padding: 24px;
      color: #fecaca;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <div class="title" id="title">Попередній перегляд</div>
    <button id="openOriginal">Відкрити в LibreOffice</button>
    <button id="showInFolder">Показати в папці</button>
    <button id="closeWindow">Закрити</button>
  </div>

  <div class="viewer" id="viewer"></div>

  <script>
    const data = window.previewApi.getData();

    document.getElementById('title').textContent = data.title || 'Попередній перегляд';

    const viewer = document.getElementById('viewer');

    if (data.pdfUrl) {
      const iframe = document.createElement('iframe');
      iframe.src = data.pdfUrl;
      viewer.appendChild(iframe);
    } else {
      const error = document.createElement('div');
      error.className = 'error';
      error.textContent = 'PDF для попереднього перегляду не знайдено.';
      viewer.appendChild(error);
    }

    document.getElementById('openOriginal').addEventListener('click', async () => {
      await window.previewApi.openOriginal();
    });

    document.getElementById('showInFolder').addEventListener('click', async () => {
      await window.previewApi.showInFolder();
    });

    document.getElementById('closeWindow').addEventListener('click', async () => {
      await window.previewApi.closeWindow();
    });
  </script>
</body>
</html>
